services:
  - type: web
    name: brawl-render-proxy
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BRAWL_API_TOKEN
        sync: false
      - key: BRAWL_API_BASE
        value: https://api.brawlstars.com/v1
